name: Build and Publish

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Authenticate to GitHub Packages
        run: dotnet nuget update source github --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text
      - name: Restore
        run: |
          dotnet restore src/Robotico.Outbox.Mishima/Robotico.Outbox.Mishima.csproj
          dotnet restore tests/Robotico.Outbox.Mishima.Tests/Robotico.Outbox.Mishima.Tests.csproj
      - name: Build
        run: |
          dotnet build src/Robotico.Outbox.Mishima/Robotico.Outbox.Mishima.csproj -c Release --no-restore
          dotnet build tests/Robotico.Outbox.Mishima.Tests/Robotico.Outbox.Mishima.Tests.csproj -c Release --no-restore
      - name: Test
        run: |
          dotnet test tests/Robotico.Outbox.Mishima.Tests/Robotico.Outbox.Mishima.Tests.csproj --no-build -c Release --verbosity normal \
            --collect:"XPlat Code Coverage" --results-directory ./coverage --settings tests/coverlet.runsettings
      - name: Check line coverage (Robotico.Outbox.Mishima ≥ 85%)
        run: |
          set -e
          COV_FILE=$(find ./coverage -name 'coverage.cobertura.xml' 2>/dev/null | head -1)
          if [ -z "$COV_FILE" ]; then echo "No coverage file found"; exit 1; fi
          RATE=$(sed -n 's/.*line-rate="\([^"]*\)".*/\1/p' "$COV_FILE" | head -1)
          if [ -z "$RATE" ]; then echo "Could not parse line-rate"; exit 1; fi
          echo "Line coverage (overall in report): ${RATE}"
          if [ "$(echo "$RATE < 0.85" | bc)" -eq 1 ]; then echo "Coverage below 85%"; exit 1; fi
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        with:
          directory: ./coverage
          fail_ci_if_error: false

  publish-nuget:
    needs: [build-and-test]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    if: github.event_name == 'release' && github.event.action == 'published' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Authenticate to GitHub Packages
        run: dotnet nuget update source github --username ${{ github.repository_owner }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text
      - name: Derive version from tag or Directory.Build.props
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            VER=$(grep '<Version>' Directory.Build.props | head -1 | sed 's/.*<Version>\([^<]*\)<\/Version>.*/\1/')
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi
      - name: Restore and pack
        run: |
          dotnet restore src/Robotico.Outbox.Mishima/Robotico.Outbox.Mishima.csproj
          dotnet pack src/Robotico.Outbox.Mishima/Robotico.Outbox.Mishima.csproj -c Release --no-restore -p:Version=${{ steps.version.outputs.version }} -o artifacts
      - name: Push to GitHub Packages
        run: dotnet nuget push artifacts/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
